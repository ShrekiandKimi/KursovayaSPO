version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taxopark_db
    environment:
      POSTGRES_DB: taxopark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taxopark_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taxopark_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taxopark.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - taxopark_network

  backend:
    build:
      context: ./backend      # <--- Собирает из папки backend
      dockerfile: Dockerfile
    container_name: taxopark_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres123@postgres:5432/taxopark?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taxopark_network

  frontend:
    build:
      context: .              # <--- Собирает из текущей папки (корня)
      dockerfile: Dockerfile  # <--- Использует Dockerfile из корня
    container_name: taxopark_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taxopark_network

networks:
  taxopark_network:
    driver: bridge

volumes:
  postgres_data: